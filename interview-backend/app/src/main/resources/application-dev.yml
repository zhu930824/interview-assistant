management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/interview_assistant?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-prefix: ""

app:
  jwt:
    secret: InterviewAssistantSecretKeyForJwtTokenGeneration2024MustBeLongEnough
    expiration-ms: 86400000
