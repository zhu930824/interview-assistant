management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: INFO
    interview.backend: DEBUG
    com.alibaba.cloud.ai: DEBUG
    org.springframework.ai: DEBUG

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/interview_assistant?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    # password: u876mhpd
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: "0"
  ai:
    model:
      audio:
        transcription: dashscope
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      audio:
        transcription:
          options:
            model: paraformer-v2
            format: wav
            sample-rate: 16000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-prefix: ""

app:
  jwt:
    secret: InterviewAssistantSecretKeyForJwtTokenGeneration2024MustBeLongEnough
    expiration-ms: 86400000
