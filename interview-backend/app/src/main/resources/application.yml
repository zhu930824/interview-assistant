server:
  port: 8080

spring:
  profiles:
    active: dev
  application:
    name: interview-assistant
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-plus

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  storage:
    base-path: ./data/storage
  resume:
    max-retry: 3
  voice:
    session-timeout-seconds: 300
  interview:
    skill-path: classpath:/skills
  ai:
    enabled: true
    provider: dashscope
  speech:
    alibaba:
      api-key: ${DASHSCOPE_API_KEY}
      model: paraformer-realtime-v2
