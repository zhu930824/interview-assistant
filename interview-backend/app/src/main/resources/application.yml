server:
  port: 8080

spring:
  profiles:
    active: dev
  application:
    name: interview-assistant
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  storage:
    base-path: ./data/storage
  resume:
    max-retry: 3
  voice:
    session-timeout-seconds: 300
  interview:
    skill-path: classpath:/skills
  ai:
    enabled: false
    provider: stub
    api-key: ""
    model: ""
    base-url: ""
